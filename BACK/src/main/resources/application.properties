spring.application.name=backend_BITACORA
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/bitacora_bd?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect



# Security
api.key=pharmaser_secure_api_key_2026

# Timeout para peticiones asíncronas (IA local lenta en CPU) - 5 minutos
spring.mvc.async.request-timeout=300000
